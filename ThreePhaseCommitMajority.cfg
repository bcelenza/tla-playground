\* TLC Model Configuration for ThreePhaseCommitMajority
\* (Concurrent Transactions with Locking and Checksum Consensus)

CONSTANT RM = {rm1, rm2, rm3}
CONSTANT TX = {tx1, tx2}
CONSTANT Checksum = {cs1, cs2}

SPECIFICATION FairSpec

INVARIANT TypeOK
INVARIANT MutualExclusion
INVARIANT ChecksumConsistency

\* Uncomment to verify only one TX can commit:
\* INVARIANT AtMostOneCommittedTX

\* Liveness: all TXs eventually complete
PROPERTY AllTXsComplete

\* Liveness: no deadlock (all locks eventually released)
PROPERTY AllLocksReleased

\* Liveness: unhealthy RMs eventually repaired
\* PROPERTY AllChecksumsConverge

CHECK_DEADLOCK FALSE
